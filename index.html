<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator BMS — Rejestry Modbus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="frontend/css/style.css">
</head>
<body>

<header>
  <div class="header-logo-area">
    <div class="flowair-logo">
      <img src="https://flowair.com/themes/custom/droopler_subtheme/logo.svg"
           alt="FLOWAIR"
           height="36"
           style="display:block;">
    </div>
    <div class="header-title">
      <h1 data-i18n="page.h1">Kalkulator BMS</h1>
      <p data-i18n="page.subtitle">Rejestry Modbus — SYSTEM FLOWAIR</p>
    </div>
  </div>
  <div class="lang-switcher">
    <button class="lang-btn active" data-lang="pl">PL</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>
</header>

<main>
  <section class="form-section">
    <div class="form-row">
      <div class="field-group">
        <label data-i18n="form.controller">Sterownik</label>
        <select id="controllerType">
          <option value="tbox">T-box</option>
          <option value="tbox_zone">T-box Zone</option>
          <option value="mbox">M-box</option>
          <option value="hmi_wifi_ac">HMI Wi-Fi AC</option>
          <option value="hmi_wifi_ec">HMI Wi-Fi EC</option>
          <option value="drv">DRV (bezpośrednio)</option>
          <option value="cube_direct">Cube (bezpośrednio)</option>
        </select>
      </div>
      <div class="field-group" id="mode-field">
        <label data-i18n="form.mode">Tryb pracy</label>
        <div class="radio-group">
          <label class="mode-tip" data-i18n-tip="form.mode.single_tip" data-tip="W tym trybie sterujemy każdym urządzeniem indywidualnie, ekran sterownika T-box jest zablokowany"><input type="radio" name="mode" value="single" checked> Single</label>
          <label class="mode-tip" data-i18n-tip="form.mode.group_tip" data-tip="W tym trybie sterujemy grupami tych samych urządzeń, ekran sterownika T-box jest odblokowany"><input type="radio" name="mode" value="group"> Group</label>
        </div>
      </div>
    </div>

    <!-- Karta samouczka — pojawia się po wyborze sterownika -->
    <div id="tutorial-card" class="tutorial-card" style="display:none;">
      <div class="tutorial-header" onclick="toggleTutorialCard()">
        <div class="tutorial-title">
          <svg class="tut-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <text x="12" y="17" text-anchor="middle" font-size="13" font-weight="700"
                  font-style="italic" font-family="Georgia,serif"
                  fill="#3a7a8a" stroke="none">i</text>
          </svg>
          <span class="tut-label-text" id="tut-label" data-i18n="tutorial.label">Co to jest?</span>
          <span class="tut-ctrl-badge" id="tut-ctrl-name"></span>
        </div>
        <div class="tutorial-toggle">
          <span id="tut-toggle-txt">zwiń</span>
          <span class="tut-chevron open" id="tut-chevron">▲</span>
        </div>
      </div>
      <div id="tutorial-body" class="tutorial-body"></div>
    </div>

    <div class="devices-header">
      <span data-i18n="form.devices">Urządzenia</span>
    </div>

    <div id="devices-container">
      <!-- Wiersze urządzeń dodawane dynamicznie -->
    </div>

    <div id="mbox-devices-container" style="display:none">
      <!-- Wiersze urządzeń M-box dodawane dynamicznie -->
    </div>

    <div id="drv-container" style="display:none">
      <div class="devices-header" id="drv-devices-header">
        <span data-i18n="form.devices">Urządzenia</span>
      </div>
      <div class="device-row" style="margin-top:4px">
        <select id="drv-device-select"></select>
      </div>
    </div>

    <div class="form-actions" id="mbox-actions" style="display:none">
      <button id="btn-add-mbox-device" type="button" data-i18n="btn.add_device">+ Dodaj urządzenie</button>
      <button id="btn-mbox-calculate" type="button" class="btn-primary" data-i18n="btn.calculate">Oblicz</button>
    </div>

    <div class="form-actions" id="hmi-actions" style="display:none">
      <button id="btn-hmi-calculate" type="button" class="btn-primary" data-i18n="btn.calculate">Oblicz</button>
    </div>

    <div class="form-actions" id="drv-actions" style="display:none">
      <button id="btn-drv-calculate" type="button" class="btn-primary" data-i18n="btn.calculate">Oblicz</button>
    </div>

    <div class="form-actions" id="cube-actions" style="display:none">
      <button id="btn-cube-modbus" type="button" class="btn-primary">Modbus RTU / TCP</button>
      <button id="btn-cube-bacnet" type="button" class="btn-primary">BACnet IP</button>
    </div>

    <div class="form-actions" id="tbox-actions">
      <button id="btn-add-device" type="button" data-i18n="btn.add_device">+ Dodaj urządzenie</button>
      <button id="btn-calculate" type="button" class="btn-primary" data-i18n="btn.calculate">Oblicz</button>
    </div>

    <div id="form-error" class="form-error" style="display:none"></div>
  </section>

  <section id="results" style="display:none">
    <div class="results-header">
      <h2 data-i18n="result.h2">Wyniki</h2>
      <div class="results-actions-right">
        <button id="btn-reset" type="button" class="btn-secondary" data-i18n="btn.reset">Nowe obliczenie</button>
        <button id="btn-print" data-i18n="btn.print">Drukuj</button>
        <button id="btn-export-xlsx" data-i18n="btn.export_xlsx">Eksportuj Excel</button>
      </div>
    </div>
    <div id="results-content"></div>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="frontend/js/translations.js"></script>
<script src="frontend/js/devices-data.js"></script>
<script src="frontend/js/calculator.js"></script>
<script src="frontend/js/app.js"></script>
</body>
</html>
